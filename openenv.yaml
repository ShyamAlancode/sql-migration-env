name: sql-migration-env
version: "1.0.0"
description: >
  Production-grade OpenEnv RL environment for training AI agents to detect
  and remediate SQL migration failures. 24 scenarios across Easy/Medium/Hard
  difficulty tiers. Features SHA-256 cryptographic state verification,
  silent data corruption detection, and smooth reward shaping.
author: "ShyamAlancode"
entry_point: "app.main:app"
port: 7860
tags:
  - openenv
  - sql
  - database
  - data-engineering
  - rl-environment
  - safety

tasks:
  - id: easy
    name: "Fix Syntax Errors"
    difficulty: easy
    description: "Repair SQL syntax errors: missing commas, keyword typos, unclosed literals (5 scenarios)"
  - id: medium
    name: "Fix Constraint Violations"
    difficulty: medium
    description: "Handle NOT NULL/DEFAULT issues, FK violations, UNIQUE conflicts, CHECK constraints (5 scenarios)"
  - id: hard
    name: "Detect Silent Data Corruption"
    difficulty: hard
    description: "Fix semantically broken migrations: execution-order bugs, cartesian join errors, type truncation (14 scenarios)"

environment:
  type: docker
  python_version: "3.11"
  dependencies: requirements.txt
  health_check: "/health"
  reward_range: [0.0, 1.0]
  max_episode_steps: 5