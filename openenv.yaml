name: sql-migration-env
version: "1.0.0"
description: >
  RL environment where an AI agent debugs broken SQL migration
  scripts before they destroy production data. Features 15
  progressive scenarios including silent data corruption detection.
tags:
  - openenv
  - database
  - sql
  - data-engineering
author: "ShyamAlancode"  
entry_point: "app.main:app"
port: 7860
tasks:
  - id: easy
    name: "Fix Syntax Errors"
    difficulty: easy
    description: "Repair SQL syntax typos preventing execution"
  - id: medium
    name: "Fix Constraint Violations"
    difficulty: medium
    description: "Fix NOT NULL columns added without DEFAULT to existing tables"
  - id: hard
    name: "Detect Silent Data Corruption"
    difficulty: hard
    description: "Fix UPDATE without WHERE that silently corrupts all rows"